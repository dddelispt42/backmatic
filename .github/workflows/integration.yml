name: Integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install backup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync borgbackup restic
      - run: |
          for t in integration_rsync integration_borg integration_restic integration_misc; do
            cargo test --features integration-tests --test "$t" -- --test-threads=1
          done
